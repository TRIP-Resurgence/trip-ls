log /var/log/tripd.log debug
bind-address ::
!
route add e164 0119273 sip tel.arf20.com
!
acl test-acl permit 1234
acl test-acl deny 4321
!
route-map example-rm permit 10
 match e164 test-acl
 set local-preference 50
exit
route-map example-rm deny 5
 match e164 test-acl
exit
route-map example-rm permit 20
exit
!
trip 10
 ls-id 0.0.0.10
 timers 60 30 120 10 180 30 30
 default local-pref 100
 default metric 100
 peer 10.0.0.1 remote-itad 20
 peer 10.0.0.1 route-map example-rm in
exit

